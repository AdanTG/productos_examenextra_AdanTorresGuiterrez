<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar"
     class="layout-navbar container-xxl navbar navbar-expand-xl navbar-detached align-items-center bg-navbar-theme"
     id="layout-navbar">

    <div class="layout-menu-toggle navbar-nav align-items-xl-center me-3 me-xl-0 d-xl-none">
        <a class="nav-item nav-link px-0 me-xl-4" href="javascript:void(0)">
            <i class="bx bx-menu bx-sm"></i>
        </a>
    </div>

    <div class="navbar-nav-right d-flex align-items-center" id="navbar-collapse">
        <div class="navbar-nav align-items-center">
            <div class="nav-item d-flex align-items-center">
                <i class="bx bx-store-alt fs-4 lh-0 me-2"></i>
                <span class="fw-semibold">Administracion de Productos</span>
            </div>
        </div>

        <ul class="navbar-nav flex-row align-items-center ms-auto">
            <li class="nav-item navbar-dropdown dropdown-user dropdown">
                <a class="nav-link dropdown-toggle hide-arrow" href="javascript:void(0);" data-bs-toggle="dropdown">
                    <div class="d-flex align-items-center">
                        <div class="avatar avatar-online me-2">
                            <span class="avatar-initial rounded-circle bg-label-primary">
                                <i class="bx bx-user"></i>
                            </span>
                        </div>
                        <div class="d-none d-sm-block text-start">
                            <span class="fw-semibold d-block" th:text="${usuario != null ? usuario.nombre : ''}">Usuario</span>
                            <small class="text-muted" th:text="${usuario != null ? usuario.rol.name() : ''}">ROL</small>
                        </div>
                    </div>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <div class="dropdown-item-text">
                            <div class="fw-semibold" th:text="${usuario != null ? usuario.nombre : ''}">Usuario</div>
                            <small class="text-muted">Tipo: <span th:text="${usuario != null ? usuario.rol.name() : ''}">ROL</span></small>
                        </div>
                    </li>
                    <li><div class="dropdown-divider"></div></li>
                    <li>
                        <a class="dropdown-item" th:href="@{/logout}">
                            <i class="bx bx-power-off me-2"></i>
                            <span class="align-middle">Cerrar sesion</span>
                        </a>
                    </li>
                </ul>
            </li>
        </ul>
    </div>
</nav>
</body>
</html>
